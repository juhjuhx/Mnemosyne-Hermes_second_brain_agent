<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Noto Sans TC', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="40" fill="white" font-size="18" font-weight="700">Phase 2 — Indexing Pipeline</text>
  <text x="30" y="58" fill="#94a3b8" font-size="10">Single worker (v3 invariant) — file → chunks → embed → Qdrant + SQLite</text>

  <!-- Start: file drop -->
  <ellipse cx="80" cy="180" rx="55" ry="22" fill="#0f172a"/>
  <ellipse cx="80" cy="180" rx="55" ry="22" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="80" y="178" fill="white" font-size="10" font-weight="600" text-anchor="middle">File drop</text>
  <text x="80" y="190" fill="#94a3b8" font-size="8" text-anchor="middle">in inbox/</text>

  <line x1="135" y1="180" x2="180" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Watcher -->
  <rect x="180" y="155" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="180" y="155" width="120" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="240" y="178" fill="white" font-size="11" font-weight="600" text-anchor="middle">FSEvents</text>
  <text x="240" y="192" fill="#94a3b8" font-size="9" text-anchor="middle">watcher</text>

  <line x1="300" y1="180" x2="345" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Queue (single worker) -->
  <rect x="345" y="150" width="140" height="60" rx="6" fill="#0f172a"/>
  <rect x="345" y="150" width="140" height="60" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="415" y="173" fill="white" font-size="11" font-weight="600" text-anchor="middle">Single-worker</text>
  <text x="415" y="187" fill="white" font-size="11" font-weight="600" text-anchor="middle">Queue</text>
  <text x="415" y="201" fill="#fbbf24" font-size="8" text-anchor="middle">v3 invariant</text>

  <line x1="485" y1="180" x2="530" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ffprobe -->
  <polygon points="555,180 605,150 655,180 605,210" fill="#0f172a"/>
  <polygon points="555,180 605,150 655,180 605,210" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="605" y="184" fill="white" font-size="10" font-weight="600" text-anchor="middle">ffprobe</text>

  <line x1="655" y1="180" x2="700" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Dispatch by type -->
  <rect x="700" y="155" width="130" height="50" rx="6" fill="#0f172a"/>
  <rect x="700" y="155" width="130" height="50" rx="6" fill="rgba(59,130,246,0.3)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="765" y="175" fill="white" font-size="10" font-weight="600" text-anchor="middle">Dispatch by</text>
  <text x="765" y="190" fill="white" font-size="10" font-weight="600" text-anchor="middle">file type</text>

  <!-- Branches down -->
  <line x1="765" y1="205" x2="200" y2="280" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="765" y1="205" x2="450" y2="280" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="765" y1="205" x2="700" y2="280" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="765" y1="205" x2="950" y2="280" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Text path -->
  <rect x="120" y="280" width="170" height="60" rx="6" fill="#0f172a"/>
  <rect x="120" y="280" width="170" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="205" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">Text chunker</text>
  <text x="205" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">paragraph ≤512 tok</text>
  <text x="205" y="330" fill="#94a3b8" font-size="8" text-anchor="middle">*.md, *.txt, *.pdf</text>

  <!-- Image path -->
  <rect x="365" y="280" width="170" height="60" rx="6" fill="#0f172a"/>
  <rect x="365" y="280" width="170" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="450" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">Image embedder</text>
  <text x="450" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">MobileCLIP-S0</text>
  <text x="450" y="330" fill="#94a3b8" font-size="8" text-anchor="middle">letterbox 224x224</text>

  <!-- Video path -->
  <rect x="615" y="280" width="170" height="60" rx="6" fill="#0f172a"/>
  <rect x="615" y="280" width="170" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="700" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">Video slicer</text>
  <text x="700" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">PySceneDetect ≤10s</text>
  <text x="700" y="330" fill="#94a3b8" font-size="8" text-anchor="middle">+ ffmpeg middle frame</text>

  <!-- Audio path -->
  <rect x="865" y="280" width="170" height="60" rx="6" fill="#0f172a"/>
  <rect x="865" y="280" width="170" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="950" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">Audio transcriber</text>
  <text x="950" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">whisper.cpp tiny</text>
  <text x="950" y="330" fill="#94a3b8" font-size="8" text-anchor="middle">zh → workstation</text>

  <!-- Embed step (common) -->
  <line x1="205" y1="340" x2="500" y2="400" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="450" y1="340" x2="500" y2="400" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="700" y1="340" x2="500" y2="400" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="950" y1="340" x2="500" y2="400" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="430" y="400" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="430" y="400" width="180" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="520" y="423" fill="white" font-size="11" font-weight="600" text-anchor="middle">Embed (batch)</text>
  <text x="520" y="439" fill="#94a3b8" font-size="9" text-anchor="middle">nomic / MobileCLIP / BGE-M3</text>
  <text x="520" y="451" fill="#34d399" font-size="8" text-anchor="middle">text 768d / image 512d / long 1024d</text>

  <!-- Qdrant + SQLite -->
  <line x1="610" y1="430" x2="800" y2="430" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Qdrant -->
  <g transform="translate(800, 380)">
    <rect x="0" y="20" width="160" height="100" rx="2" fill="#0f172a"/>
    <ellipse cx="80" cy="20" rx="80" ry="14" fill="#0f172a"/>
    <ellipse cx="80" cy="120" rx="80" ry="14" fill="#0f172a"/>
    <rect x="0" y="20" width="160" height="100" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="80" cy="20" rx="80" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="80" cy="120" rx="80" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="0" y2="120" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="160" y1="20" x2="160" y2="120" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="80" y="60" fill="white" font-size="12" font-weight="600" text-anchor="middle">Qdrant</text>
    <text x="80" y="78" fill="#94a3b8" font-size="9" text-anchor="middle">named vectors</text>
    <text x="80" y="92" fill="#94a3b8" font-size="8" text-anchor="middle">text_vec(768)</text>
    <text x="80" y="104" fill="#94a3b8" font-size="8" text-anchor="middle">+ image_vec(512)</text>
  </g>

  <!-- SQLite -->
  <g transform="translate(1010, 400)">
    <rect x="0" y="0" width="140" height="80" rx="2" fill="#0f172a"/>
    <rect x="0" y="0" width="140" height="80" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="70" y="28" fill="white" font-size="12" font-weight="600" text-anchor="middle">SQLite</text>
    <text x="70" y="46" fill="#94a3b8" font-size="9" text-anchor="middle">files.db</text>
    <text x="70" y="60" fill="#94a3b8" font-size="8" text-anchor="middle">+ chunks.db</text>
    <text x="70" y="72" fill="#94a3b8" font-size="8" text-anchor="middle">+ tags</text>
  </g>

  <line x1="880" y1="430" x2="1010" y2="440" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Suggestion (never auto-move) -->
  <line x1="520" y1="460" x2="520" y2="520" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="520,520 590,540 520,560 450,540" fill="#0f172a"/>
  <polygon points="520,520 590,540 520,560 450,540" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="520" y="538" fill="white" font-size="10" font-weight="600" text-anchor="middle">Suggest move?</text>
  <text x="520" y="551" fill="#fbbf24" font-size="8" text-anchor="middle">(never auto-move)</text>

  <!-- User confirmation -->
  <line x1="590" y1="540" x2="700" y2="540" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <rect x="700" y="520" width="170" height="40" rx="6" fill="#0f172a"/>
  <rect x="700" y="520" width="170" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="785" y="538" fill="white" font-size="10" font-weight="600" text-anchor="middle">User confirms</text>
  <text x="785" y="552" fill="#94a3b8" font-size="8" text-anchor="middle">y / n / path override</text>

  <!-- v3 invariant callout -->
  <rect x="120" y="600" width="500" height="60" rx="6" fill="rgba(251,113,133,0.1)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="135" y="620" fill="#fb7185" font-size="11" font-weight="600">⚠ v3 INVARIANT — Single worker</text>
  <text x="135" y="638" fill="white" font-size="9">No parallel file ingestion. ONE file at a time. Parallelism OK at embed step only.</text>
  <text x="135" y="652" fill="#94a3b8" font-size="8">Why: ensures index consistency; one file is atomic w.r.t. the indexer state.</text>

  <!-- Right callout -->
  <rect x="650" y="600" width="500" height="60" rx="6" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="665" y="620" fill="#60a5fa" font-size="11" font-weight="600">ℹ Memory never forgotten</text>
  <text x="665" y="638" fill="white" font-size="9">Original file stays. SQLite + Qdrant are derived views; both rebuildable.</text>
  <text x="665" y="652" fill="#94a3b8" font-size="8">Re-run indexer with --rebuild to regenerate from source files.</text>
</svg>
