<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Noto Sans TC', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-open" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polyline points="0 0, 10 3.5, 0 7" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="40" fill="white" font-size="18" font-weight="700">Query Flow — Hermes + Skill + Tool</text>
  <text x="30" y="58" fill="#94a3b8" font-size="10">Sequence: user → Open WebUI → Hermes Agent → MCP skill → tool → response</text>

  <!-- Actors (vertical lifelines) -->
  <!-- User -->
  <rect x="60" y="100" width="100" height="40" rx="6" fill="#0f172a"/>
  <rect x="60" y="100" width="100" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="110" y="125" fill="white" font-size="11" font-weight="600" text-anchor="middle">User</text>
  <line x1="110" y1="140" x2="110" y2="600" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Open WebUI -->
  <rect x="200" y="100" width="100" height="40" rx="6" fill="#0f172a"/>
  <rect x="200" y="100" width="100" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="250" y="125" fill="white" font-size="11" font-weight="600" text-anchor="middle">Open WebUI</text>
  <line x1="250" y1="140" x2="250" y2="600" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Hermes Agent -->
  <rect x="340" y="100" width="100" height="40" rx="6" fill="#0f172a"/>
  <rect x="340" y="100" width="100" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="390" y="125" fill="white" font-size="11" font-weight="600" text-anchor="middle">Hermes Agent</text>
  <line x1="390" y1="140" x2="390" y2="600" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Mnemosyne (memory) -->
  <rect x="480" y="100" width="100" height="40" rx="6" fill="#0f172a"/>
  <rect x="480" y="100" width="100" height="40" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="530" y="125" fill="white" font-size="11" font-weight="600" text-anchor="middle">Mnemosyne</text>
  <line x1="530" y1="140" x2="530" y2="600" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Skill (MCP) -->
  <rect x="620" y="100" width="100" height="40" rx="6" fill="#0f172a"/>
  <rect x="620" y="100" width="100" height="40" rx="6" fill="rgba(59,130,246,0.4)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="670" y="125" fill="white" font-size="11" font-weight="600" text-anchor="middle">Skill (MCP)</text>
  <line x1="670" y1="140" x2="670" y2="600" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Tool / LLM -->
  <rect x="760" y="100" width="100" height="40" rx="6" fill="#0f172a"/>
  <rect x="760" y="100" width="100" height="40" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="810" y="125" fill="white" font-size="11" font-weight="600" text-anchor="middle">LLM / Tool</text>
  <line x1="810" y1="140" x2="810" y2="600" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step 1: User query -->
  <line x1="110" y1="180" x2="250" y2="180" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="180" y="172" fill="#22d3ee" font-size="9" font-weight="600">1. POST /v1/chat</text>
  <text x="180" y="195" fill="#94a3b8" font-size="8" text-anchor="middle">"Photos of my dog at the beach"</text>

  <line x1="250" y1="220" x2="390" y2="220" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="320" y="212" fill="#22d3ee" font-size="9" font-weight="600">2. Forward</text>

  <!-- Step 3: Memory retrieve -->
  <line x1="390" y1="260" x2="530" y2="260" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="252" fill="#a78bfa" font-size="9" font-weight="600">3. retrieve_context</text>
  <text x="460" y="273" fill="#94a3b8" font-size="8" text-anchor="middle">(SQLite + Qdrant)</text>

  <line x1="530" y1="300" x2="390" y2="300" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-open)"/>
  <text x="460" y="293" fill="#94a3b8" font-size="8">20 memories</text>

  <!-- Step 4: Hermes decides to invoke a skill -->
  <rect x="350" y="320" width="180" height="40" rx="6" fill="#0f172a"/>
  <rect x="350" y="320" width="180" height="40" rx="6" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="440" y="338" fill="white" font-size="10" font-weight="600" text-anchor="middle">Hermes: pick tool</text>
  <text x="440" y="351" fill="#94a3b8" font-size="8" text-anchor="middle">qdrant-search (image)</text>

  <!-- Step 5: Invoke skill -->
  <line x1="390" y1="380" x2="670" y2="380" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="372" fill="#60a5fa" font-size="9" font-weight="600">5. invoke skill</text>
  <text x="530" y="393" fill="#94a3b8" font-size="8" text-anchor="middle">qdrant.search(query=..., modality=image)</text>

  <!-- Step 6: Tool does the actual work -->
  <line x1="670" y1="420" x2="810" y2="420" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="740" y="412" fill="#fbbf24" font-size="9" font-weight="600">6. tool</text>

  <rect x="730" y="430" width="160" height="60" rx="6" fill="#0f172a"/>
  <rect x="730" y="430" width="160" height="60" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="810" y="453" fill="white" font-size="10" font-weight="600" text-anchor="middle">embed text → Qdrant</text>
  <text x="810" y="467" fill="#94a3b8" font-size="8" text-anchor="middle">search text_vec + image_vec</text>
  <text x="810" y="481" fill="#94a3b8" font-size="8" text-anchor="middle">return top-10 with scores</text>

  <!-- Tool returns -->
  <line x1="810" y1="495" x2="670" y2="495" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-open)"/>
  <text x="740" y="510" fill="#94a3b8" font-size="8">10 hits</text>

  <line x1="670" y1="525" x2="390" y2="525" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-open)"/>
  <text x="530" y="540" fill="#94a3b8" font-size="8" text-anchor="middle">results</text>

  <!-- Step 7: Hermes routes to LLM -->
  <line x1="390" y1="555" x2="810" y2="555" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="547" fill="#fbbf24" font-size="9" font-weight="600">7. Generate answer (LLM)</text>
  <text x="600" y="572" fill="#94a3b8" font-size="8" text-anchor="middle">local Gemma (easy) or remote Qwen (hard)</text>

  <line x1="810" y1="580" x2="390" y2="580" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-open)"/>
  <text x="600" y="595" fill="#94a3b8" font-size="8">text response</text>

  <!-- Step 8: Record in memory -->
  <line x1="390" y1="610" x2="530" y2="610" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="602" fill="#a78bfa" font-size="9" font-weight="600">8. record</text>

  <!-- Response to user -->
  <line x1="390" y1="640" x2="250" y2="640" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="320" y="632" fill="#22d3ee" font-size="9" font-weight="600">9. response</text>

  <line x1="250" y1="660" x2="110" y2="660" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="180" y="652" fill="#22d3ee" font-size="9" font-weight="600">10. display</text>
</svg>
