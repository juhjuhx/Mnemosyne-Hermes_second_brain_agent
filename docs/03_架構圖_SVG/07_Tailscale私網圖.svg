<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Noto Sans TC', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="40" fill="white" font-size="18" font-weight="700">Tailscale Private Mesh</text>
  <text x="30" y="58" fill="#94a3b8" font-size="10">Encrypted WireGuard; tag-based ACLs; all services bound to 127.0.0.1</text>

  <!-- Center: Tailscale coord server -->
  <rect x="400" y="100" width="200" height="70" rx="6" fill="#0f172a"/>
  <rect x="400" y="100" width="200" height="70" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="500" y="125" fill="white" font-size="12" font-weight="600" text-anchor="middle">Tailscale coord</text>
  <text x="500" y="142" fill="#94a3b8" font-size="9" text-anchor="middle">(or Headscale)</text>
  <text x="500" y="158" fill="#fbbf24" font-size="8" text-anchor="middle">control plane only</text>

  <!-- M1 -->
  <rect x="100" y="280" width="180" height="100" rx="6" fill="#0f172a"/>
  <rect x="100" y="280" width="180" height="100" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="190" y="305" fill="white" font-size="13" font-weight="600" text-anchor="middle">M1</text>
  <text x="190" y="324" fill="#22d3ee" font-size="10" text-anchor="middle">tag:m1</text>
  <text x="190" y="343" fill="#94a3b8" font-size="9" text-anchor="middle">100.x.x.x</text>
  <text x="190" y="358" fill="white" font-size="9" text-anchor="middle">Services:</text>
  <text x="190" y="371" fill="#94a3b8" font-size="8" text-anchor="middle">:11434 :6333 :8642 :3000</text>

  <!-- Workstation -->
  <rect x="410" y="280" width="180" height="100" rx="6" fill="#0f172a"/>
  <rect x="410" y="280" width="180" height="100" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="500" y="305" fill="white" font-size="13" font-weight="600" text-anchor="middle">Workstation</text>
  <text x="500" y="324" fill="#34d399" font-size="10" text-anchor="middle">tag:station</text>
  <text x="500" y="343" fill="#94a3b8" font-size="9" text-anchor="middle">100.y.y.y</text>
  <text x="500" y="358" fill="white" font-size="9" text-anchor="middle">Services:</text>
  <text x="500" y="371" fill="#94a3b8" font-size="8" text-anchor="middle">:8080 :6333 (mirror)</text>

  <!-- Phone -->
  <rect x="720" y="280" width="180" height="100" rx="6" fill="#0f172a"/>
  <rect x="720" y="280" width="180" height="100" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="810" y="305" fill="white" font-size="13" font-weight="600" text-anchor="middle">Phone</text>
  <text x="810" y="324" fill="#22d3ee" font-size="10" text-anchor="middle">tag:phone</text>
  <text x="810" y="343" fill="#94a3b8" font-size="9" text-anchor="middle">100.z.z.z</text>
  <text x="810" y="358" fill="white" font-size="9" text-anchor="middle">Browser/PWA only</text>
  <text x="810" y="371" fill="#94a3b8" font-size="8" text-anchor="middle">:3000 (read-only UI)</text>

  <!-- Lines from coord to each -->
  <line x1="450" y1="170" x2="190" y2="280" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="500" y1="170" x2="500" y2="280" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="550" y1="170" x2="810" y2="280" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Direct M1 ↔ Workstation (WireGuard, encrypted) -->
  <line x1="280" y1="330" x2="410" y2="330" stroke="#34d399" stroke-width="2.5"/>
  <text x="345" y="325" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">WireGuard</text>
  <text x="345" y="346" fill="#34d399" font-size="9" text-anchor="middle">~1ms LAN</text>
  <text x="345" y="358" fill="#94a3b8" font-size="8" text-anchor="middle">allowed ports: see ACL</text>

  <!-- ACL table -->
  <rect x="40" y="430" width="920" height="150" rx="6" fill="#0f172a"/>
  <rect x="40" y="430" width="920" height="150" rx="6" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="55" y="450" fill="#fbbf24" font-size="11" font-weight="600">Tag-based ACLs (Tailscale JSON)</text>

  <text x="60" y="478" fill="white" font-size="10" font-weight="600">src → dst : ports</text>
  <text x="60" y="498" fill="white" font-size="9">tag:m1  →  tag:station : 8080 (llama), 6333 (qdrant mirror)</text>
  <text x="60" y="514" fill="white" font-size="9">tag:station  →  tag:m1 : 11434 (ollama), 6333 (qdrant), 8642 (hermes)</text>
  <text x="60" y="530" fill="white" font-size="9">tag:phone  →  tag:m1 : 3000 (open webui only)</text>
  <text x="60" y="546" fill="white" font-size="9">tag:phone  →  tag:station : (deny — no rules)</text>
  <text x="60" y="562" fill="white" font-size="9">all → all : (deny by default)</text>
  <text x="60" y="578" fill="#94a3b8" font-size="8">tagOwners: tag:m1, tag:station, tag:phone all owned by autogroup:admin</text>
</svg>
