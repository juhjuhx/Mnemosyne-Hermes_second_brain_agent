<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Noto Sans TC', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="40" fill="white" font-size="18" font-weight="700">Memory Write Path — Hermes → Mnemosyne + Qdrant</text>
  <text x="30" y="58" fill="#94a3b8" font-size="10">SQLite for structured (working + episodic); Qdrant for semantic (vector search)</text>

  <!-- Trigger: Hermes event -->
  <rect x="60" y="120" width="180" height="60" rx="6" fill="#0f172a"/>
  <rect x="60" y="120" width="180" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="150" y="143" fill="white" font-size="11" font-weight="600" text-anchor="middle">Hermes event</text>
  <text x="150" y="160" fill="#94a3b8" font-size="9" text-anchor="middle">post_tool_call /</text>
  <text x="150" y="173" fill="#94a3b8" font-size="9" text-anchor="middle">on_message</text>

  <line x1="240" y1="150" x2="290" y2="150" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Mnemosyne record -->
  <rect x="290" y="115" width="180" height="70" rx="6" fill="#0f172a"/>
  <rect x="290" y="115" width="180" height="70" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="380" y="140" fill="white" font-size="11" font-weight="600" text-anchor="middle">Mnemosyne.record</text>
  <text x="380" y="156" fill="#94a3b8" font-size="9" text-anchor="middle">event_type, payload,</text>
  <text x="380" y="170" fill="#94a3b8" font-size="9" text-anchor="middle">timestamp, entities</text>

  <!-- Branch: SQLite -->
  <line x1="380" y1="185" x2="240" y2="270" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="185" x2="540" y2="270" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SQLite -->
  <g transform="translate(140, 270)">
    <rect x="0" y="20" width="200" height="120" rx="2" fill="#0f172a"/>
    <ellipse cx="100" cy="20" rx="100" ry="14" fill="#0f172a"/>
    <ellipse cx="100" cy="140" rx="100" ry="14" fill="#0f172a"/>
    <rect x="0" y="20" width="200" height="120" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="100" cy="20" rx="100" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="100" cy="140" rx="100" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="0" y2="140" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="200" y1="20" x2="200" y2="140" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="100" y="60" fill="white" font-size="12" font-weight="600" text-anchor="middle">SQLite</text>
    <text x="100" y="80" fill="#94a3b8" font-size="9" text-anchor="middle">mnemosyne.db</text>
    <text x="100" y="100" fill="#94a3b8" font-size="8" text-anchor="middle">working + episodic tables</text>
    <text x="100" y="115" fill="#94a3b8" font-size="8" text-anchor="middle">+ entities</text>
    <text x="100" y="130" fill="#94a3b8" font-size="8" text-anchor="middle">+ tag relationships</text>
  </g>

  <!-- Qdrant -->
  <g transform="translate(440, 270)">
    <rect x="0" y="20" width="200" height="120" rx="2" fill="#0f172a"/>
    <ellipse cx="100" cy="20" rx="100" ry="14" fill="#0f172a"/>
    <ellipse cx="100" cy="140" rx="100" ry="14" fill="#0f172a"/>
    <rect x="0" y="20" width="200" height="120" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="100" cy="20" rx="100" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="100" cy="140" rx="100" ry="14" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="20" x2="0" y2="140" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="200" y1="20" x2="200" y2="140" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="100" y="60" fill="white" font-size="12" font-weight="600" text-anchor="middle">Qdrant</text>
    <text x="100" y="80" fill="#94a3b8" font-size="9" text-anchor="middle">second_brain</text>
    <text x="100" y="100" fill="#94a3b8" font-size="8" text-anchor="middle">named vectors:</text>
    <text x="100" y="115" fill="#94a3b8" font-size="8" text-anchor="middle">text_vec(768)</text>
    <text x="100" y="130" fill="#94a3b8" font-size="8" text-anchor="middle">+ image_vec(512)</text>
  </g>

  <!-- Read path: at right -->
  <line x1="380" y1="115" x2="780" y2="115" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="580" y="108" fill="#22d3ee" font-size="9" font-weight="600">on query: read</text>

  <!-- Read path: Mnemosyne retrieve -->
  <rect x="780" y="80" width="220" height="100" rx="6" fill="#0f172a"/>
  <rect x="780" y="80" width="220" height="100" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="890" y="105" fill="white" font-size="11" font-weight="600" text-anchor="middle">Mnemosyne.retrieve</text>
  <text x="890" y="123" fill="#94a3b8" font-size="9" text-anchor="middle">query, top_k=20,</text>
  <text x="890" y="137" fill="#94a3b8" font-size="9" text-anchor="middle">recency_weight=0.3</text>
  <text x="890" y="153" fill="#fbbf24" font-size="8" text-anchor="middle">re-rank with time-decay</text>
  <text x="890" y="168" fill="#94a3b8" font-size="8" text-anchor="middle">→ top-K context</text>

  <!-- Bottom: invariants -->
  <rect x="40" y="450" width="1020" height="120" rx="6" fill="#0f172a"/>
  <rect x="40" y="450" width="1020" height="120" rx="6" fill="rgba(251,113,133,0.1)" stroke="#fb7185" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="60" y="472" fill="#fb7185" font-size="11" font-weight="600">v3 invariants preserved</text>
  <text x="60" y="494" fill="white" font-size="9">✓ Named vectors: text_vec(768) + image_vec(512) in Qdrant</text>
  <text x="60" y="510" fill="white" font-size="9">✓ Memory never forgotten: SQLite + Qdrant are derived; source files are truth</text>
  <text x="60" y="526" fill="white" font-size="9">✓ Single worker: indexing is one file at a time (memory writes are per-event, NOT per-file-worker)</text>
  <text x="60" y="542" fill="white" font-size="9">✓ No facial / voice emotion: Mnemosyne stores events, NOT biometric features</text>
  <text x="60" y="558" fill="#94a3b8" font-size="8">Mnemosyne growth control: vacuum nightly; archive &gt; 90 days to RAID/_archive/mnemosyne/</text>
</svg>
