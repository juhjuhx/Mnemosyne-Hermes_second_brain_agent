<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Noto Sans TC', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="40" fill="white" font-size="18" font-weight="700">Phase 0 — Day 1 Bootstrap Flow</text>
  <text x="30" y="58" fill="#94a3b8" font-size="10">Goal: both machines reachable, software installed, RAID mounted</text>

  <!-- Start -->
  <ellipse cx="500" cy="100" rx="50" ry="22" fill="#0f172a"/>
  <ellipse cx="500" cy="100" rx="50" ry="22" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="500" y="105" fill="white" font-size="11" font-weight="600" text-anchor="middle">Start</text>

  <!-- Branch: M1 vs Workstation -->
  <line x1="500" y1="122" x2="250" y2="170" stroke="#64748b" stroke-width="1.5"/>
  <line x1="500" y1="122" x2="750" y2="170" stroke="#64748b" stroke-width="1.5"/>

  <text x="335" y="160" fill="#94a3b8" font-size="9">M1 path</text>
  <text x="665" y="160" fill="#94a3b8" font-size="9">Workstation path</text>

  <!-- M1 column steps -->
  <!-- Step 1: brew install -->
  <rect x="100" y="180" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="100" y="180" width="300" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="203" fill="white" font-size="11" font-weight="600" text-anchor="middle">1. Install Homebrew + tools</text>
  <text x="250" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">python@3.11, git, jq, ripgrep</text>
  <text x="250" y="232" fill="#94a3b8" font-size="8" text-anchor="middle">xcode-select --install (Metal)</text>

  <line x1="250" y1="240" x2="250" y2="265" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Step 2: Tailscale -->
  <rect x="100" y="270" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="100" y="270" width="300" height="60" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="250" y="293" fill="white" font-size="11" font-weight="600" text-anchor="middle">2. Install Tailscale</text>
  <text x="250" y="310" fill="#94a3b8" font-size="9" text-anchor="middle">brew install --cask tailscale</text>
  <text x="250" y="322" fill="#94a3b8" font-size="8" text-anchor="middle">sudo tailscale up --advertise-tags=tag:m1</text>

  <line x1="250" y1="330" x2="250" y2="355" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Step 3: directory -->
  <rect x="100" y="360" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="100" y="360" width="300" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="383" fill="white" font-size="11" font-weight="600" text-anchor="middle">3. Create ai-brain/</text>
  <text x="250" y="400" fill="#94a3b8" font-size="9" text-anchor="middle">mkdir -p ~/ai-brain/{venv,models,...}</text>
  <text x="250" y="412" fill="#94a3b8" font-size="8" text-anchor="middle">git clone repo; symlink src/</text>

  <line x1="250" y1="420" x2="250" y2="445" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Step 4: venv -->
  <rect x="100" y="450" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="100" y="450" width="300" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="473" fill="white" font-size="11" font-weight="600" text-anchor="middle">4. Create Python venv</text>
  <text x="250" y="490" fill="#94a3b8" font-size="9" text-anchor="middle">python3.11 -m venv venv</text>
  <text x="250" y="502" fill="#94a3b8" font-size="8" text-anchor="middle">pip install --upgrade pip</text>

  <line x1="250" y1="510" x2="250" y2="535" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Step 5: Mount RAID -->
  <rect x="100" y="540" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="100" y="540" width="300" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="250" y="563" fill="white" font-size="11" font-weight="600" text-anchor="middle">5. Mount RAID (if available)</text>
  <text x="250" y="580" fill="#94a3b8" font-size="9" text-anchor="middle">mount_smbfs //nas/... /Volumes/RAID</text>
  <text x="250" y="592" fill="#94a3b8" font-size="8" text-anchor="middle">verify read+write</text>

  <!-- Workstation column steps -->
  <!-- Step 1: dnf/apt -->
  <rect x="600" y="180" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="600" y="180" width="300" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="750" y="203" fill="white" font-size="11" font-weight="600" text-anchor="middle">1. Install OS packages</text>
  <text x="750" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">python3.11, git, jq, gcc, cmake</text>
  <text x="750" y="232" fill="#94a3b8" font-size="8" text-anchor="middle">vulkan-tools, mesa-vulkan-drivers</text>

  <line x1="750" y1="240" x2="750" y2="265" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Step 2: Tailscale -->
  <rect x="600" y="270" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="600" y="270" width="300" height="60" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="750" y="293" fill="white" font-size="11" font-weight="600" text-anchor="middle">2. Install Tailscale</text>
  <text x="750" y="310" fill="#94a3b8" font-size="9" text-anchor="middle">curl ... | sh</text>
  <text x="750" y="322" fill="#94a3b8" font-size="8" text-anchor="middle">systemctl enable --now tailscaled</text>

  <line x1="750" y1="330" x2="750" y2="355" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Step 3: directory -->
  <rect x="600" y="360" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="600" y="360" width="300" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="750" y="383" fill="white" font-size="11" font-weight="600" text-anchor="middle">3. Create ai-brain-station/</text>
  <text x="750" y="400" fill="#94a3b8" font-size="9" text-anchor="middle">mkdir -p ~/ai-brain-station/...</text>
  <text x="750" y="412" fill="#94a3b8" font-size="8" text-anchor="middle">git clone repo; symlink src/</text>

  <line x1="750" y1="420" x2="750" y2="445" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Step 4: venv -->
  <rect x="600" y="450" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="600" y="450" width="300" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="750" y="473" fill="white" font-size="11" font-weight="600" text-anchor="middle">4. Create Python venv</text>
  <text x="750" y="490" fill="#94a3b8" font-size="9" text-anchor="middle">python3.11 -m venv venv</text>
  <text x="750" y="502" fill="#94a3b8" font-size="8" text-anchor="middle">pip install --upgrade pip</text>

  <line x1="750" y1="510" x2="750" y2="535" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Step 5: Mount RAID -->
  <rect x="600" y="540" width="300" height="60" rx="6" fill="#0f172a"/>
  <rect x="600" y="540" width="300" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="563" fill="white" font-size="11" font-weight="600" text-anchor="middle">5. Mount RAID (if available)</text>
  <text x="750" y="580" fill="#94a3b8" font-size="9" text-anchor="middle">edit /etc/fstab; mount -a</text>
  <text x="750" y="592" fill="#94a3b8" font-size="8" text-anchor="middle">verify read+write</text>

  <!-- Convergence: Tailscale ping -->
  <line x1="250" y1="600" x2="500" y2="680" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <line x1="750" y1="600" x2="500" y2="680" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <polygon points="500,640 530,680 470,680" fill="#0f172a"/>
  <polygon points="500,640 530,680 470,680" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="500" y="673" fill="white" font-size="10" font-weight="600" text-anchor="middle">Mesh</text>
  <text x="500" y="685" fill="#94a3b8" font-size="8" text-anchor="middle">up?</text>

  <line x1="500" y1="700" x2="500" y2="725" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Verify -->
  <rect x="320" y="730" width="360" height="60" rx="6" fill="#0f172a"/>
  <rect x="320" y="730" width="360" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="500" y="753" fill="white" font-size="12" font-weight="600" text-anchor="middle">Verify: ping m1 ↔ station, Tailscale ACLs,</text>
  <text x="500" y="770" fill="white" font-size="12" font-weight="600" text-anchor="middle">Vulkan visible, RAM headroom ≥ 1GB</text>
  <text x="500" y="784" fill="#94a3b8" font-size="9" text-anchor="middle">If all pass → Phase 1</text>

  <!-- End -->
  <line x1="500" y1="790" x2="500" y2="820" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <ellipse cx="500" cy="845" rx="80" ry="22" fill="#0f172a"/>
  <ellipse cx="500" cy="845" rx="80" ry="22" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="500" y="850" fill="white" font-size="11" font-weight="600" text-anchor="middle">Phase 0 done</text>
</svg>
