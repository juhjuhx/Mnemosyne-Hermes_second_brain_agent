<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Noto Sans TC', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="40" fill="white" font-size="18" font-weight="700">M1 + Workstation Dual-Machine Topology</text>
  <text x="30" y="58" fill="#94a3b8" font-size="10">Personal AI Second Brain v4 — Architecture B</text>

  <!-- M1 region -->
  <rect x="50" y="90" width="500" height="640" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="70" y="115" fill="#22d3ee" font-size="13" font-weight="600">M1 Air (8GB / 256GB)</text>
  <text x="70" y="130" fill="#94a3b8" font-size="9">Edge agent + perception + NAS</text>

  <!-- Workstation region -->
  <rect x="650" y="90" width="500" height="640" rx="12" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="670" y="115" fill="#34d399" font-size="13" font-weight="600">Workstation (48GB + A770 16GB)</text>
  <text x="670" y="130" fill="#94a3b8" font-size="9">Heavy LLM inference</text>

  <!-- Tailscale mesh in middle -->
  <rect x="555" y="370" width="90" height="60" rx="6" fill="#0f172a"/>
  <rect x="555" y="370" width="90" height="60" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="395" fill="white" font-size="10" font-weight="600" text-anchor="middle">Tailscale</text>
  <text x="600" y="412" fill="#94a3b8" font-size="8" text-anchor="middle">mesh VPN</text>

  <!-- M1 services -->
  <!-- Ollama -->
  <rect x="80" y="160" width="180" height="65" rx="6" fill="#0f172a"/>
  <rect x="80" y="160" width="180" height="65" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="170" y="184" fill="white" font-size="12" font-weight="600" text-anchor="middle">Ollama</text>
  <text x="170" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">:11434 · Metal</text>
  <text x="170" y="214" fill="#94a3b8" font-size="8" text-anchor="middle">Gemma 4 E2B Q4</text>

  <!-- Qdrant -->
  <rect x="80" y="245" width="180" height="65" rx="6" fill="#0f172a"/>
  <rect x="80" y="245" width="180" height="65" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="170" y="269" fill="white" font-size="12" font-weight="600" text-anchor="middle">Qdrant</text>
  <text x="170" y="285" fill="#94a3b8" font-size="9" text-anchor="middle">:6333 · named vectors</text>
  <text x="170" y="299" fill="#94a3b8" font-size="8" text-anchor="middle">text_vec(768)+image_vec(512)</text>

  <!-- Mnemosyne -->
  <rect x="80" y="330" width="180" height="65" rx="6" fill="#0f172a"/>
  <rect x="80" y="330" width="180" height="65" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="170" y="354" fill="white" font-size="12" font-weight="600" text-anchor="middle">Mnemosyne</text>
  <text x="170" y="370" fill="#94a3b8" font-size="9" text-anchor="middle">SQLite only</text>
  <text x="170" y="384" fill="#94a3b8" font-size="8" text-anchor="middle">3-tier memory</text>

  <!-- Hermes Agent -->
  <rect x="80" y="460" width="180" height="65" rx="6" fill="#0f172a"/>
  <rect x="80" y="460" width="180" height="65" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="170" y="484" fill="white" font-size="12" font-weight="600" text-anchor="middle">Hermes Agent</text>
  <text x="170" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">:8642 · MCP-native</text>
  <text x="170" y="514" fill="#94a3b8" font-size="8" text-anchor="middle">NousResearch</text>

  <!-- Indexer -->
  <rect x="80" y="545" width="180" height="55" rx="6" fill="#0f172a"/>
  <rect x="80" y="545" width="180" height="55" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="170" y="568" fill="white" font-size="12" font-weight="600" text-anchor="middle">Indexer (1 worker)</text>
  <text x="170" y="585" fill="#94a3b8" font-size="9" text-anchor="middle">FSEvents → queue → Qdrant</text>

  <!-- Open WebUI -->
  <rect x="80" y="620" width="180" height="55" rx="6" fill="#0f172a"/>
  <rect x="80" y="620" width="180" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="170" y="643" fill="white" font-size="12" font-weight="600" text-anchor="middle">Open WebUI</text>
  <text x="170" y="660" fill="#94a3b8" font-size="9" text-anchor="middle">:3000 · chat UI · PWA</text>

  <!-- Hermes skills -->
  <rect x="300" y="460" width="220" height="215" rx="6" fill="#0f172a"/>
  <rect x="300" y="460" width="220" height="215" rx="6" fill="rgba(59,130,246,0.15)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="310" y="482" fill="#60a5fa" font-size="10" font-weight="600">Hermes Skills (MCP)</text>

  <rect x="315" y="495" width="190" height="42" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="410" y="513" fill="white" font-size="10" font-weight="600" text-anchor="middle">qdrant-search</text>
  <text x="410" y="527" fill="#94a3b8" font-size="8" text-anchor="middle">vector retrieval</text>

  <rect x="315" y="547" width="190" height="42" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="410" y="565" fill="white" font-size="10" font-weight="600" text-anchor="middle">filesystem-search</text>
  <text x="410" y="579" fill="#94a3b8" font-size="8" text-anchor="middle">metadata lookup</text>

  <rect x="315" y="599" width="190" height="42" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="410" y="617" fill="white" font-size="10" font-weight="600" text-anchor="middle">video-slice</text>
  <text x="410" y="631" fill="#94a3b8" font-size="8" text-anchor="middle">PySceneDetect + whisper</text>

  <!-- Workstation services -->
  <!-- llama-server -->
  <rect x="680" y="160" width="200" height="80" rx="6" fill="#0f172a"/>
  <rect x="680" y="160" width="200" height="80" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="780" y="184" fill="white" font-size="12" font-weight="600" text-anchor="middle">llama-server</text>
  <text x="780" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">:8080 · Vulkan · A770</text>
  <text x="780" y="216" fill="#94a3b8" font-size="9" text-anchor="middle">Qwen 3.6 27B-PRISM-DQ</text>
  <text x="780" y="230" fill="#34d399" font-size="8" text-anchor="middle">+ MTP speculative decoding</text>

  <!-- Qdrant mirror -->
  <rect x="680" y="260" width="200" height="65" rx="6" fill="#0f172a"/>
  <rect x="680" y="260" width="200" height="65" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="780" y="284" fill="white" font-size="12" font-weight="600" text-anchor="middle">Qdrant mirror</text>
  <text x="780" y="300" fill="#94a3b8" font-size="9" text-anchor="middle">:6333 · read-only</text>
  <text x="780" y="314" fill="#94a3b8" font-size="8" text-anchor="middle">from M1's storage</text>

  <!-- On-demand services -->
  <rect x="680" y="345" width="200" height="80" rx="6" fill="#0f172a"/>
  <rect x="680" y="345" width="200" height="80" rx="6" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="780" y="367" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">On-Demand</text>
  <text x="780" y="385" fill="#94a3b8" font-size="9" text-anchor="middle">BGE-M3 embeddings</text>
  <text x="780" y="399" fill="#94a3b8" font-size="9" text-anchor="middle">faster-whisper large-v3</text>
  <text x="780" y="413" fill="#94a3b8" font-size="9" text-anchor="middle">siglip-base-512</text>

  <!-- Workstation extras -->
  <rect x="900" y="160" width="220" height="265" rx="6" fill="#0f172a"/>
  <rect x="900" y="160" width="220" height="265" rx="6" fill="rgba(30,41,59,0.3)" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="920" y="183" fill="#94a3b8" font-size="11" font-weight="600">Hardware</text>
  <text x="920" y="208" fill="white" font-size="10">CPU: Ryzen 7 5800X</text>
  <text x="920" y="226" fill="white" font-size="10">RAM: 48GB DDR4</text>
  <text x="920" y="244" fill="white" font-size="10">GPU: A770 16GB</text>
  <text x="920" y="262" fill="white" font-size="10">OS: Fedora 41</text>
  <text x="920" y="280" fill="#94a3b8" font-size="9">Vulkan backend</text>
  <text x="920" y="298" fill="#94a3b8" font-size="9">RPC server (Phase 5)</text>
  <text x="920" y="316" fill="#94a3b8" font-size="9">KTransformers ready</text>
  <text x="920" y="334" fill="#34d399" font-size="9">27B Q4 = 13.7GB</text>
  <text x="920" y="352" fill="#34d399" font-size="9">+ KV = 16GB</text>
  <text x="920" y="370" fill="#fbbf24" font-size="9">80→121 tok/s with MTP</text>
  <text x="920" y="395" fill="#94a3b8" font-size="9">Backup: 35B-A3B APEX</text>
  <text x="920" y="413" fill="#94a3b8" font-size="9">17GB I-Compact</text>

  <!-- M1 hardware box -->
  <rect x="300" y="160" width="220" height="280" rx="6" fill="#0f172a"/>
  <rect x="300" y="160" width="220" height="280" rx="6" fill="rgba(30,41,59,0.3)" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="320" y="183" fill="#94a3b8" font-size="11" font-weight="600">Hardware</text>
  <text x="320" y="208" fill="white" font-size="10">CPU: 8-core M1</text>
  <text x="320" y="226" fill="white" font-size="10">RAM: 8GB unified</text>
  <text x="320" y="244" fill="white" font-size="10">GPU: 7-core Metal</text>
  <text x="320" y="262" fill="white" font-size="10">SSD: 256GB</text>
  <text x="320" y="280" fill="white" font-size="10">OS: macOS 14+</text>
  <text x="320" y="298" fill="#94a3b8" font-size="9">launchd for services</text>
  <text x="320" y="316" fill="#34d399" font-size="9">Gemma 2.5GB</text>
  <text x="320" y="334" fill="#34d399" font-size="9">+ Ollama 0.5GB</text>
  <text x="320" y="352" fill="#34d399" font-size="9">+ Hermes 0.5GB</text>
  <text x="320" y="370" fill="#34d399" font-size="9">+ macOS 2.5GB</text>
  <text x="320" y="388" fill="#fbbf24" font-size="9">Total ~6.9GB / 8GB</text>
  <text x="320" y="406" fill="#94a3b8" font-size="9">Peak: indexing time</text>
  <text x="320" y="424" fill="#94a3b8" font-size="9">Sleep = wake re-init</text>

  <!-- Connections -->
  <!-- M1 Ollama → Tailscale -->
  <line x1="260" y1="192" x2="555" y2="395" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="380" y="280" fill="#34d399" font-size="8">LAN ~1ms</text>

  <!-- M1 Qdrant → Tailscale -->
  <line x1="260" y1="277" x2="555" y2="400" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="320" fill="#a78bfa" font-size="8">sync</text>

  <!-- M1 Hermes → Tailscale -->
  <line x1="260" y1="492" x2="555" y2="410" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Tailscale → Workstation llama-server -->
  <line x1="645" y1="395" x2="680" y2="200" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- Tailscale → Workstation Qdrant -->
  <line x1="645" y1="400" x2="680" y2="290" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Hermes → skills -->
  <line x1="260" y1="492" x2="300" y2="515" stroke="#22d3ee" stroke-width="1.5"/>

  <!-- Indexer → Qdrant -->
  <line x1="170" y1="545" x2="170" y2="310" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phone / external -->
  <rect x="555" y="560" width="90" height="60" rx="6" fill="#0f172a"/>
  <rect x="555" y="560" width="90" height="60" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="600" y="585" fill="white" font-size="10" font-weight="600" text-anchor="middle">Phone</text>
  <text x="600" y="602" fill="#94a3b8" font-size="8" text-anchor="middle">PWA / browser</text>

  <line x1="260" y1="650" x2="555" y2="595" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="30" y="745" width="1140" height="40" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="50" y="763" fill="#94a3b8" font-size="9" font-weight="600">LEGEND</text>
  <rect x="100" y="755" width="14" height="14" rx="2" fill="rgba(8,51,68,0.4)" stroke="#22d3ee"/>
  <text x="120" y="765" fill="white" font-size="9">Frontend/UI</text>
  <rect x="220" y="755" width="14" height="14" rx="2" fill="rgba(6,78,59,0.4)" stroke="#34d399"/>
  <text x="240" y="765" fill="white" font-size="9">Backend service</text>
  <rect x="350" y="755" width="14" height="14" rx="2" fill="rgba(76,29,149,0.4)" stroke="#a78bfa"/>
  <text x="370" y="765" fill="white" font-size="9">Storage/DB</text>
  <rect x="470" y="755" width="14" height="14" rx="2" fill="rgba(120,53,15,0.3)" stroke="#fbbf24"/>
  <text x="490" y="765" fill="white" font-size="9">On-demand/Cloud-equiv</text>
  <rect x="650" y="755" width="14" height="14" rx="2" fill="rgba(251,146,60,0.3)" stroke="#fb923c"/>
  <text x="670" y="765" fill="white" font-size="9">Queue/bus</text>
  <line x1="780" y1="762" x2="810" y2="762" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="820" y="765" fill="white" font-size="9">data flow</text>
  <line x1="900" y1="762" x2="930" y2="762" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <text x="940" y="765" fill="white" font-size="9">optional</text>
</svg>
