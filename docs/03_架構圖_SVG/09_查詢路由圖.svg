<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Noto Sans TC', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="30" y="40" fill="white" font-size="18" font-weight="700">Query Routing — Which LLM Handles What?</text>
  <text x="30" y="58" fill="#94a3b8" font-size="10">Complexity-based routing: M1 Ollama (fast/cheap) vs Workstation llama-server (slow/quality)</text>

  <!-- Start: User query -->
  <ellipse cx="450" cy="120" rx="60" ry="22" fill="#0f172a"/>
  <ellipse cx="450" cy="120" rx="60" ry="22" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="450" y="125" fill="white" font-size="11" font-weight="600" text-anchor="middle">User query</text>

  <!-- Hermes -->
  <line x1="450" y1="142" x2="450" y2="180" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="370" y="180" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="370" y="180" width="160" height="55" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="450" y="203" fill="white" font-size="11" font-weight="600" text-anchor="middle">Hermes Agent</text>
  <text x="450" y="220" fill="#94a3b8" font-size="9" text-anchor="middle">routing logic</text>

  <!-- Decision diamond -->
  <line x1="450" y1="235" x2="450" y2="270" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <polygon points="450,280 530,335 450,390 370,335" fill="#0f172a"/>
  <polygon points="450,280 530,335 450,390 370,335" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="328" fill="white" font-size="10" font-weight="600" text-anchor="middle">Easy or</text>
  <text x="450" y="343" fill="white" font-size="10" font-weight="600" text-anchor="middle">hard?</text>

  <!-- Easy path: M1 Ollama -->
  <line x1="370" y1="335" x2="180" y2="335" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="275" y="328" fill="#34d399" font-size="9" font-weight="600">Easy</text>
  <text x="275" y="350" fill="#94a3b8" font-size="8" text-anchor="middle">short, simple</text>

  <rect x="40" y="300" width="140" height="70" rx="6" fill="#0f172a"/>
  <rect x="40" y="300" width="140" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="110" y="325" fill="white" font-size="11" font-weight="600" text-anchor="middle">M1: Ollama</text>
  <text x="110" y="342" fill="#94a3b8" font-size="9" text-anchor="middle">Gemma 4 E2B</text>
  <text x="110" y="357" fill="#34d399" font-size="8" text-anchor="middle">~25 tok/s · local</text>

  <!-- Hard path: workstation -->
  <line x1="530" y1="335" x2="720" y2="335" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="625" y="328" fill="#a78bfa" font-size="9" font-weight="600">Hard</text>
  <text x="625" y="350" fill="#94a3b8" font-size="8" text-anchor="middle">long, complex</text>

  <rect x="720" y="300" width="160" height="70" rx="6" fill="#0f172a"/>
  <rect x="720" y="300" width="160" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="800" y="325" fill="white" font-size="11" font-weight="600" text-anchor="middle">Workstation</text>
  <text x="800" y="342" fill="#94a3b8" font-size="9" text-anchor="middle">Qwen 3.6 27B</text>
  <text x="800" y="357" fill="#34d399" font-size="8" text-anchor="middle">~80-121 tok/s · LAN</text>

  <!-- Both converge to answer -->
  <line x1="110" y1="370" x2="450" y2="430" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-emerald)"/>
  <line x1="800" y1="370" x2="450" y2="430" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-violet)"/>

  <rect x="370" y="430" width="160" height="55" rx="6" fill="#0f172a"/>
  <rect x="370" y="430" width="160" height="55" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="450" y="453" fill="white" font-size="11" font-weight="600" text-anchor="middle">Response</text>
  <text x="450" y="470" fill="#94a3b8" font-size="9" text-anchor="middle">back to user</text>

  <!-- Routing rules table -->
  <rect x="40" y="510" width="820" height="70" rx="6" fill="#0f172a"/>
  <rect x="40" y="510" width="820" height="70" rx="6" fill="rgba(59,130,246,0.1)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="55" y="528" fill="#60a5fa" font-size="10" font-weight="600">Routing rules (Hermes config.yaml)</text>
  <text x="55" y="546" fill="white" font-size="9">• chars &lt; 200  AND  no keyword in [research, analysis, summarization]  →  M1 (Ollama)</text>
  <text x="55" y="560" fill="white" font-size="9">• chars ≥ 200  OR  has keyword  OR  multi-doc context  →  Workstation (Qwen)</text>
  <text x="55" y="574" fill="#94a3b8" font-size="8">Default per v4 Q01: M1 runs Hermes. Workstation is invoked via Tailscale mesh.</text>
</svg>
