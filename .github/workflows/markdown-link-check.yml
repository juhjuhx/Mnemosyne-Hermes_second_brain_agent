name: Markdown link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # weekly

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          # All non-default config lives in ./lychee.toml (excludes, accept codes,
          # cache). Only pass --offline and the input paths here so the workflow
          # stays version-agnostic across lychee releases.
          args: --offline docs/ README.md
          fail: true
